general:
{
   exp_dir: experiments/tlab_finetune
}

dataset:
{
   include "../datasets/TLab/tlab_body.conf"
   collate: {type: motion}
}

train:
{
   network: codewithrot
   pretrained_ckpt: /content/Air-IO/AirIO_EuRoC/AirIO_checkpoint/best_model.ckpt

   lr: 1e-4
   min_lr: 1e-6
   batch_size: 128
   max_epoches: 30
   patience: 5
   factor: 0.2
   weight_decay: 1e-4

   weight: 1e2
   cov_weight: 1e-4
   propcov: True
   covaug: True
   loss: Huber_loss005
   rotloss: Huber_loss005

   save_freq: 5
   eval_freq: 1
}
